<button onclick="startScan()">📷 เปิดกล้องสแกน</button>
<button onclick="stopScan()">ปิดกล้อง</button>

<video id="video" autoplay playsinline muted
  style="width:100%;max-width:420px;border-radius:16px;background:#000;">
</video>

<input id="searchBox" placeholder="ค่าที่สแกนได้">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
let codeReader;
let lastValue = "";
let lastTime = 0;

async function startScan() {
  const video = document.getElementById("video");

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();

    await codeReader.decodeFromConstraints(
      {
        video: {
          facingMode: "environment",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      },
      video,
      (result, err) => {
        if (result) {
          const value = result.getText();
          const now = Date.now();

          // กันอ่านซ้ำเร็วเกินไป
          if (value === lastValue && now - lastTime < 1000) return;

          lastValue = value;
          lastTime = now;

          document.getElementById("searchBox").value = value;

          console.log("SCAN:", value);

          // ถ้ามีฟังก์ชันค้นหาเดิม
          if (typeof loadData === "function") {
            loadData();
          }
        }
      }
    );

  } catch (e) {
    alert("เปิดกล้องไม่ได้: " + e.message);
    console.error(e);
  }
}

function stopScan() {
  if (codeReader) {
    codeReader.reset();
  }
}
</script>
