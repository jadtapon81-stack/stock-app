<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Stock App Mobile | Shoe Warehouse</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    /* =====================
       1) ตั้งค่า Supabase
       ===================== */
    const supabaseUrl = 'https://asslmgjcicpgrxwqaenx.supabase.co'
    const supabaseKey = 'sb_publishable_PLOIg4kX4r8PN9LXvXZVIQ_OiF-yj-K'
    const supabase = createClient(supabaseUrl, supabaseKey)

    const MASTER_TABLE = 'Master_Data'
    const COUNT_TABLE = 'stock_count'
    const PAGE_SIZE = 1000

    let masterRows = []
    let offlineIndex = new Map()
    let countRows = []
    let savedKeys = new Set()
    let html5QrScanner = null
    let zxingReader = null
    let currentUser = localStorage.getItem('stock_user') || ''

    const $ = (id) => document.getElementById(id)

    window.addEventListener('DOMContentLoaded', () => {
      if (currentUser) {
        $('loginPage').style.display = 'none'
        $('appPage').style.display = 'block'
        $('userNameText').textContent = currentUser
        $('countedBy').value = currentUser
        showPage('master')
        loadMasterData()
      } else {
        $('loginPage').style.display = 'flex'
        $('appPage').style.display = 'none'
      }
    })

    /* =====================
       2) Login / Menu
       ===================== */
    window.login = function () {
      const name = $('loginName').value.trim()
      if (!name) return alert('กรุณาใส่ชื่อผู้ใช้งาน')
      localStorage.setItem('stock_user', name)
      currentUser = name
      $('userNameText').textContent = name
      $('countedBy').value = name
      $('loginPage').style.display = 'none'
      $('appPage').style.display = 'block'
      showPage('master')
      loadMasterData()
    }

    window.logout = function () {
      localStorage.removeItem('stock_user')
      location.reload()
    }

    window.toggleMenu = function () {
      $('sideMenu').classList.toggle('open')
      $('overlay').classList.toggle('show')
    }

    window.closeMenu = function () {
      $('sideMenu').classList.remove('open')
      $('overlay').classList.remove('show')
    }

    window.showPage = function (page) {
      $('masterPage').style.display = page === 'master' ? 'block' : 'none'
      $('countPage').style.display = page === 'count' ? 'block' : 'none'
      $('btnMaster').classList.toggle('active', page === 'master')
      $('btnCount').classList.toggle('active', page === 'count')
      closeMenu()
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    /* =====================
       3) Load Master Data ทั้งหมด
       ===================== */
    async function fetchAll(tableName) {
      let all = []
      let from = 0

      while (true) {
        const to = from + PAGE_SIZE - 1
        const { data, error } = await supabase
          .from(tableName)
          .select('*')
          .range(from, to)

        if (error) throw error
        if (!data || data.length === 0) break

        all = all.concat(data)
        if (data.length < PAGE_SIZE) break
        from += PAGE_SIZE
      }

      return all
    }

    window.loadMasterData = async function () {
      setLoading(true, 'กำลังโหลด Master Data...')
      try {
        masterRows = await fetchAll(MASTER_TABLE)
        buildOfflineIndex(masterRows)
        await loadCountHistory()
        renderMasterTable(masterRows)
      } catch (err) {
        alert('โหลดข้อมูลไม่สำเร็จ: ' + err.message)
      } finally {
        setLoading(false)
      }
    }

    function normalize(v) {
      return String(v ?? '').toLowerCase().replace(/\s+/g, '').replace(/-/g, '')
    }

    function addToOfflineIndex(key, row) {
      const k = normalize(key)
      if (!k) return
      if (!offlineIndex.has(k)) offlineIndex.set(k, [])
      offlineIndex.get(k).push(row)
    }

    function buildOfflineIndex(rows) {
      offlineIndex = new Map()
      rows.forEach(r => {
        addToOfflineIndex(r.item_key, r)
        addToOfflineIndex(r.CODE ?? r.code, r)
        addToOfflineIndex(r.Item ?? r.item, r)
        addToOfflineIndex(r.Location ?? r.location, r)
        addToOfflineIndex(r.Assort ?? r.assort, r)
      })
    }

    function searchOfflineRows(keyword) {
      const q = normalize(keyword)
      if (!q) return []
      const exact = offlineIndex.get(q)
      if (exact && exact.length) return exact

      // fallback สำหรับกรณีสแกนแล้วมีข้อความยาว/มีช่องว่าง/มี prefix-suffix
      return masterRows.filter(r => {
        const fields = [
          r.item_key,
          r.CODE ?? r.code,
          r.Item ?? r.item,
          r.Location ?? r.location,
          r.Assort ?? r.assort
        ].map(normalize)
        return fields.some(v => v && (v.includes(q) || q.includes(v)))
      })
    }

    function searchRows(rows, keyword) {
      const q = normalize(keyword)
      if (!q) return rows
      return rows.filter(r => {
        const text = [
          r.Item, r.item, r.CODE, r.code, r.Assort, r.assort,
          r.Location, r.location, r.item_key, r.Quantity, r.quantity
        ].map(normalize).join('|')
        return text.includes(q)
      })
    }

    window.searchMaster = function () {
      renderMasterTable(searchRows(masterRows, $('masterSearch').value))
    }

    window.clearMasterSearch = function () {
      $('masterSearch').value = ''
      renderMasterTable(masterRows)
    }

    function renderMasterTable(rows) {
      $('masterCount').textContent = rows.length.toLocaleString('th-TH')
      const body = $('masterBody')
      const cards = $('masterCards')
      body.innerHTML = ''
      cards.innerHTML = ''

      rows.forEach(r => {
        const item = r.Item ?? r.item ?? ''
        const code = r.CODE ?? r.code ?? ''
        const assort = r.Assort ?? r.assort ?? ''
        const location = r.Location ?? r.location ?? ''
        const qty = r.Quantity ?? r.quantity ?? ''
        const key = r.item_key ?? ''

        body.insertAdjacentHTML('beforeend', `
          <tr>
            <td>${safe(item)}</td>
            <td>${safe(code)}</td>
            <td>${safe(assort)}</td>
            <td>${safe(location)}</td>
            <td>${safe(qty)}</td>
            <td>${safe(key)}</td>
          </tr>
        `)

        cards.insertAdjacentHTML('beforeend', `
          <article class="mobile-item-card">
            <div class="mobile-card-top">
              <div>
                <b>${safe(item)}</b>
                <span>${safe(key || '-')}</span>
              </div>
              <strong>${safe(qty)}</strong>
            </div>
            <div class="mobile-card-grid">
              <div><small>CODE</small><p>${safe(code)}</p></div>
              <div><small>Assort</small><p>${safe(assort)}</p></div>
              <div><small>Location</small><p>${safe(location)}</p></div>
            </div>
          </article>
        `)
      })
    }

    async function loadCountHistory() {
      try {
        countRows = await fetchAll(COUNT_TABLE)
        savedKeys = new Set(countRows.map(makeSavedKey))
      } catch (err) {
        console.warn('โหลดประวัติการนับไม่สำเร็จ', err)
        countRows = []
        savedKeys = new Set()
      }
    }

    function makeSavedKey(r) {
      const masterId = r.master_id ?? r.id ?? ''
      const itemKey = r.item_key ?? ''
      const item = r.item ?? r.Item ?? ''
      const code = r.code ?? r.CODE ?? ''
      const assort = r.assort ?? r.Assort ?? ''
      const location = r.location ?? r.Location ?? ''
      return [masterId, itemKey, item, code, assort, location].map(v => String(v ?? '').trim()).join('|')
    }

    function isSaved(r) {
      return savedKeys.has(makeSavedKey(r))
    }

    function getSavedRow(r) {
      const key = makeSavedKey(r)
      return countRows.find(row => makeSavedKey(row) === key) || null
    }

    window.clearCountSearch = function () {
      $('countSearch').value = ''
      $('countResult').innerHTML = `<div class="empty">ค้นหารหัสสินค้า หรือกดสแกนเพื่อเริ่มนับสต็อก</div>`
      $('countSearch').focus()
    }

    /* =====================
       4) Stock Count
       ===================== */
    function renderCountResult(result) {
      const box = $('countResult')
      box.innerHTML = ''

      result.forEach(r => {
        const item = r.Item ?? r.item ?? ''
        const code = r.CODE ?? r.code ?? ''
        const assort = r.Assort ?? r.assort ?? ''
        const location = r.Location ?? r.location ?? ''
        const qty = r.Quantity ?? r.quantity ?? 0
        const key = r.item_key ?? ''

        const savedRow = getSavedRow(r)
        const saved = !!savedRow
        const savedQty = savedRow?.count_qty ?? ''
        box.insertAdjacentHTML('beforeend', `
          <div class="result-card ${saved ? 'saved-card' : ''}" id="card_${safe(r.id)}">
            <div class="shoe-badge">👟</div>
            ${saved ? '<div class="saved-status">บันทึกแล้ว</div>' : ''}
            <div class="result-grid">
              <div><b>Item</b><span>${safe(item)}</span></div>
              <div><b>CODE</b><span>${safe(code)}</span></div>
              <div><b>Assort</b><span>${safe(assort)}</span></div>
              <div><b>Location</b><span>${safe(location)}</span></div>
              <div><b>System Qty</b><span>${safe(qty)}</span></div>
              <div><b>item_key</b><span>${safe(key)}</span></div>
            </div>
            <div class="count-form">
              <input type="number" inputmode="decimal" placeholder="จำนวนที่นับได้" id="count_${safe(r.id)}" value="${safe(savedQty)}">
              <button class="save-btn" id="save_${safe(r.id)}" onclick='saveCount(${JSON.stringify(r).replace(/'/g, "&#39;")})'>${saved ? 'อัปเดต' : 'บันทึก'}</button>
              <button class="scan-btn" type="button" onclick="openScanner('countSearch')">สแกน</button>
            </div>
          </div>
        `)
      })
    }

    window.searchForCount = function () {
      const keyword = $('countSearch').value
      const box = $('countResult')

      if (!keyword.trim()) {
        box.innerHTML = `<div class="empty">กรุณากรอกข้อมูลเพื่อค้นหา</div>`
        return
      }

      const result = searchOfflineRows(keyword)

      if (result.length === 0) {
        box.innerHTML = `<div class="empty">ไม่มีข้อมูลที่ตรงกับ: ${safe(keyword)}</div>`
        return
      }

      renderCountResult(result)
    }

    window.saveCount = async function (r) {
      const input = $('count_' + r.id)
      const countQty = Number(input.value)
      if (input.value === '') return alert('กรุณาใส่จำนวนที่นับได้')

      const payload = {
        master_id: r.id,
        item_key: r.item_key ?? null,
        item: r.Item ?? r.item ?? null,
        code: r.CODE ?? r.code ?? null,
        assort: r.Assort ?? r.assort ?? null,
        location: r.Location ?? r.location ?? null,
        system_qty: Number(r.Quantity ?? r.quantity ?? 0),
        count_qty: countQty,
        counted_by: currentUser
      }

      const oldRow = getSavedRow(r)

      if (oldRow) {
        let query = supabase.from(COUNT_TABLE).update(payload)
        if (oldRow.id) query = query.eq('id', oldRow.id)
        else query = query.eq('master_id', r.id).eq('item_key', payload.item_key)

        const { error } = await query
        if (error) return alert('อัปเดตไม่สำเร็จ: ' + error.message)

        countRows = countRows.map(row => makeSavedKey(row) === makeSavedKey(r) ? { ...row, ...payload } : row)
        const saveBtn = $('save_' + r.id)
        if (saveBtn) saveBtn.textContent = 'อัปเดต'
        const card = $('card_' + r.id)
        if (card) {
          card.classList.add('saved-card')
          if (!card.querySelector('.saved-status')) card.insertAdjacentHTML('afterbegin', '<div class="saved-status">บันทึกแล้ว</div>')
        }
        showToast('อัปเดตสำเร็จ')
        return
      }

      const { data, error } = await supabase.from(COUNT_TABLE).insert(payload).select('*').single()
      if (error) return alert('บันทึกไม่สำเร็จ: ' + error.message)

      countRows.push(data || payload)
      savedKeys.add(makeSavedKey(r))
      const saveBtn = $('save_' + r.id)
      if (saveBtn) saveBtn.textContent = 'อัปเดต'
      const card = $('card_' + r.id)
      if (card) {
        card.classList.add('saved-card')
        if (!card.querySelector('.saved-status')) card.insertAdjacentHTML('afterbegin', '<div class="saved-status">บันทึกแล้ว</div>')
      }
      showToast('บันทึกสำเร็จ')
    }

    /* =====================
       5) Scanner (ZXing - กล้องหลังเร็ว / อ่านเจออะไรเอาค่านั้น)
       ===================== */
    let lastScanValue = ''
    let lastScanTime = 0

    async function handleScanValue(value, targetId) {
      value = String(value || '').trim()
      if (!value) return

      $(targetId).value = value
      await closeScanner()

      if (targetId === 'countSearch') {
        const result = searchOfflineRows(value)

        if (result.length === 0) {
          $('countResult').innerHTML = `<div class="empty">ไม่พบข้อมูลที่ตรงกับ: ${safe(value)}</div>`
          showToast('ไม่พบข้อมูล')
          return
        }

        renderCountResult(result)
        showToast('พบข้อมูล ' + result.length + ' รายการ')
      } else {
        showToast('สแกนสำเร็จ: ' + value)
      }
    }

    window.openScanner = async function (targetId = 'countSearch') {
      const modal = $('scannerModal')
      const text = $('scannerText')
      const reader = $('scannerReader')

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        return alert('เบราว์เซอร์ไม่รองรับกล้อง หรือไม่ได้เปิดผ่าน https')
      }

      if (!window.ZXing) {
        return alert('โหลดระบบสแกนไม่สำเร็จ กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วเปิดใหม่')
      }

      try {
        modal.classList.add('show')
        text.textContent = 'กำลังเปิดกล้องหลัง...'
        reader.innerHTML = `<video id="scannerVideo" autoplay playsinline muted style="width:100%;max-height:360px;object-fit:cover;border-radius:18px;background:#020617;"></video>`
        const video = $('scannerVideo')

        if (zxingReader) {
          try { zxingReader.reset() } catch (e) {}
          zxingReader = null
        }

        zxingReader = new ZXing.BrowserMultiFormatReader()

        const constraints = {
          audio: false,
          video: {
            facingMode: 'environment',
            width: { ideal: 640 },
            height: { ideal: 480 }
          }
        }

        await zxingReader.decodeFromConstraints(constraints, video, async (result, err) => {
          if (!result) return

          const code = String(result.getText() || '').trim()
          const now = Date.now()

          if (!code) return
          if (code === lastScanValue && now - lastScanTime < 700) return

          lastScanValue = code
          lastScanTime = now

          try { zxingReader.reset() } catch (e) {}
          await handleScanValue(code, targetId)
        })

        text.textContent = 'เล็งกล้องไปที่ Barcode / QR Code'
      } catch (err) {
        console.error(err)
        await closeScanner()
        alert('เปิดกล้องไม่ได้: ' + (err?.message || err))
      }
    }

    window.closeScanner = async function () {
      if (zxingReader) {
        try { zxingReader.reset() } catch (e) {}
        zxingReader = null
      }

      const video = $('scannerVideo')
      if (video && video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop())
        video.srcObject = null
      }

      const reader = $('scannerReader')
      if (reader) reader.innerHTML = ''

      const modal = $('scannerModal')
      if (modal) modal.classList.remove('show')
    }

    function safe(v) {
      return String(v ?? '').replace(/[&<>'"]/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[c]))
    }

    function setLoading(show, text = '') {
      $('loadingText').textContent = text
      $('loading').style.display = show ? 'flex' : 'none'
    }

    function showToast(text) {
      $('toast').textContent = text
      $('toast').classList.add('show')
      setTimeout(() => $('toast').classList.remove('show'), 1800)
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap');

      --dark: #0f172a;

      --card: #ffffff;
      --line: #e5e7eb;
      --text: #111827;

      --blue: #2563eb;

      --soft-blue: #eff6ff;

      margin: 0;

    }

    .login-page {
      min-height: 100vh;

      justify-content: center;

    main {

    .page-card {

    }

    .title { text-align: center; margin: 0 0 22px; font-size: 36px; }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 150px 110px;
      gap: 10px;
      margin-bottom: 16px;
    }

    .search-wrapper {
      position: relative;
    }

    .search-wrapper input {
      padding-right: 48px;
    }

    .clear-search {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #eef2f7;
      color: #64748b;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .search-row button, .count-form button {
      border: 0;
      border-radius: 16px;
      background: var(--blue);
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .search-row .clear { background: #64748b; }
    .search-row .scan { background: #0f766e; }
    .count-search-row { grid-template-columns: 1fr 120px; }

    .count-line {
      text-align: right;
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 8px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      max-height: 70vh;
    }

    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th {
      position: sticky;
      top: 0;
      background: #1f2937;
      color: white;
      padding: 13px;
      white-space: nowrap;
      font-size: 16px;
    }
    td { padding: 13px; border-bottom: 1px solid var(--line); text-align: center; }
    tr:nth-child(even) { background: #f8fafc; }

    .result-card {
      position: relative;
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }

    .shoe-badge {
      position: absolute;
      right: 18px;
      top: 18px;
      font-size: 28px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding-right: 42px;
    }

    .result-grid div {
      background: var(--soft-blue);
      border-radius: 16px;
      padding: 12px;
    }

    .result-grid b { display: block; font-size: 14px; color: var(--muted); }
    .result-grid span { font-size: 20px; font-weight: 600; }

    .count-form {
      display: grid;
      grid-template-columns: 1fr 112px 96px;
      gap: 10px;
      margin-top: 14px;
    }

    .count-form .scan-btn { background: #0f766e; }
    .count-form button:disabled, .count-form input:disabled { opacity: .65; cursor: not-allowed; }

    .saved-card { border-color: #86efac; background: linear-gradient(180deg, #ffffff, #f0fdf4); }

    .saved-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #dcfce7;
      color: #166534;
      font-weight: 700;
      font-size: 14px;
    }

    .saved-status::before { content: '✓'; }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      margin-top: 14px;
    }

    .scanner-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2800;
      padding: 22px;
      background: rgba(15,23,42,.92);
      align-items: center;
      justify-content: center;
    }

    .scanner-modal.show { display: flex; }

    .scanner-box {
      width: 100%;
      max-width: 440px;
      background: white;
      border-radius: 24px;
      padding: 16px;
      text-align: center;
    }

    .scanner-box video {
      width: 100%;
      max-height: 360px;
      border-radius: 18px;
      background: #020617;
      object-fit: cover;
    }


    #scannerReader {
      width: 100%;
      min-height: 260px;
      border-radius: 18px;
      overflow: hidden;
      background: #020617;
    }

    #scannerReader video {
      width: 100% !important;
      max-height: 360px;
      object-fit: cover;
      border-radius: 18px;
    }

    .scanner-box p { color: var(--muted); margin: 10px 0; }

    .scanner-close {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 14px;
      background: var(--red);
      color: white;
      font-weight: 700;
      font-size: 17px;
    }

    .loading {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 3000;
      align-items: center;
      justify-content: center;
      background: rgba(15,23,42,.5);
      color: white;
      font-size: 20px;
      font-weight: 700;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(80px);
      background: #16a34a;
      color: white;
      padding: 14px 22px;
      border-radius: 999px;
      opacity: 0;
      transition: .25s;
      z-index: 4000;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }



    .mobile-cards { display: none; }

    .mobile-item-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: white;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 8px 20px rgba(15,23,42,.06);
    }

    .mobile-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #e5e7eb;
    }

    .mobile-card-top b { display: block; font-size: 20px; line-height: 1.2; }
    .mobile-card-top span { display: block; color: var(--muted); font-size: 13px; margin-top: 3px; word-break: break-all; }
    .mobile-card-top strong { background: #ecfdf5; color: #047857; padding: 6px 12px; border-radius: 999px; font-size: 18px; white-space: nowrap; }

    .mobile-card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .mobile-card-grid div { background: #f8fafc; border-radius: 14px; padding: 9px; min-width: 0; }
    .mobile-card-grid small { color: var(--muted); font-size: 12px; }
    .mobile-card-grid p { margin: 2px 0 0; font-weight: 700; font-size: 16px; word-break: break-word; }

    .bottom-nav {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1100;
      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
      background: rgba(255,255,255,.94);
      backdrop-filter: blur(16px);
      border-top: 1px solid #e5e7eb;
      box-shadow: 0 -10px 30px rgba(15,23,42,.08);
    }

    .bottom-nav button {
      border: 0;
      border-radius: 16px;
      background: transparent;
      color: #64748b;
      padding: 8px 4px;
      font-size: 12px;
      font-weight: 700;
    }

    .bottom-nav span { display: block; font-size: 22px; line-height: 1; }
    .bottom-nav b { display: block; margin-top: 3px; }
    .bottom-nav button.active { background: #eff6ff; color: var(--blue); }

    @media (max-width: 720px) {
      body { background: #eef2f7; }
      .topbar { height: calc(64px + env(safe-area-inset-top)); padding-left: 12px; padding-right: 12px; }
      .hamburger { width: 44px; height: 44px; font-size: 24px; }
      .brand b { font-size: 19px; }
      .brand span { font-size: 12px; }
      main { padding: 12px 10px calc(24px + env(safe-area-inset-bottom)); }
      .page-card { padding: 16px 12px; border-radius: 24px; box-shadow: none; }
      .title { font-size: 28px; margin-bottom: 16px; }
      input { font-size: 16px; padding: 15px 16px; border-radius: 15px; }
      .search-row { grid-template-columns: 1fr 96px; gap: 8px; }
      .count-search-row { grid-template-columns: 1fr 96px; }
      .search-row .clear { grid-column: 1 / -1; }
      .search-row button { padding: 0 10px; min-height: 54px; font-size: 16px; }
      .count-line { font-size: 15px; margin: 2px 2px 10px; }
      .table-wrap { display: none; }
      .mobile-cards { display: block; }
      .mobile-card-grid { grid-template-columns: repeat(3, 1fr); }
      .result-card { padding: 14px; border-radius: 20px; }
      .shoe-badge { right: 14px; top: 14px; font-size: 24px; }
      .result-grid { grid-template-columns: 1fr 1fr; gap: 8px; padding-right: 32px; }
      .result-grid div { padding: 10px; border-radius: 14px; }
      .result-grid span { font-size: 17px; }
      .count-form { grid-template-columns: 1fr 1fr; }
      .count-form input { grid-column: 1 / -1; }
      .count-form button { padding: 15px; min-height: 54px; }
      .side-menu { width: 82vw; max-width: 320px; left: -86vw; }
      .login-card { border-radius: 26px; padding: 30px 22px; }
      .login-card h1 { font-size: 30px; }
    }

    @media (max-width: 390px) {
      .mobile-card-grid { grid-template-columns: 1fr 1fr; }
      .search-row { grid-template-columns: 1fr; }
      .result-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <!-- Login -->
  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="logo">👟</div>
      <h1>STOCK APP</h1>
      <p>Shoe Warehouse Counting System</p>
      <input id="loginName" placeholder="ใส่ชื่อผู้ใช้งาน เช่น Moo" onkeydown="if(event.key==='Enter') login()">
      <button class="primary-btn" onclick="login()">เข้าสู่ระบบ</button>
    </div>
  </section>

  <!-- App -->
  <section id="appPage" class="app-page">
    <header class="topbar">
      <button class="hamburger" onclick="toggleMenu()">☰</button>
      <div class="brand">
        <b>STOCK APP</b>
        <span>Shoe Warehouse</span>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu">
      <div class="menu-head">
        <div class="icon">👟</div>
        <b>ผู้ใช้งาน: <span id="userNameText"></span></b>
        <span>ระบบคลังรองเท้า</span>
      </div>
      <button id="btnMaster" class="menu-btn" onclick="showPage('master')">📦 Master Data</button>
      <button id="btnCount" class="menu-btn" onclick="showPage('count')">📝 Stock Count</button>
      <button class="menu-btn logout" onclick="logout()">ออกจากระบบ</button>
    </aside>

    <div id="overlay" class="overlay" onclick="closeMenu()"></div>

    <main>
      <!-- Master Data -->
      <section id="masterPage" class="page-card">
        <h2 class="title">Master Data</h2>
        <div class="search-row">
          <input id="masterSearch" placeholder="ค้นหา Item / CODE / Location / item_key" onkeydown="if(event.key==='Enter') searchMaster()">
          <button onclick="searchMaster()">ค้นหา</button>
          <button class="clear" onclick="clearMasterSearch()">ล้าง</button>
        </div>
        <div class="count-line">จำนวนแถว: <b id="masterCount">0</b></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Item</th>
                <th>CODE</th>
                <th>Assort</th>
                <th>Location</th>
                <th>Quantity</th>
                <th>item_key</th>
              </tr>
            </thead>
            <tbody id="masterBody"></tbody>
          </table>
        </div>
        <div id="masterCards" class="mobile-cards"></div>
      </section>

      <!-- Stock Count -->
      <section id="countPage" class="page-card" style="display:none;">
        <h2 class="title">Stock Count</h2>
        <input id="countedBy" type="hidden">
        <div class="search-row count-search-row">
          <div class="search-wrapper">
            <input id="countSearch" placeholder="ค้นหา Item / CODE / item_key / Location" onkeydown="if(event.key==='Enter') searchForCount()">
            <span class="clear-search" onclick="clearCountSearch()">×</span>
          </div>
          <button onclick="searchForCount()">ค้นหา</button>
          <button class="scan" onclick="openScanner('countSearch')">สแกน</button>
        </div>
        <div id="countResult" class="empty">ค้นหารหัสสินค้า หรือกดสแกนเพื่อเริ่มนับสต็อก</div>
      </section>
    </main>

  </section>

  <div id="scannerModal" class="scanner-modal">
    <div class="scanner-box">
      <div id="scannerReader"></div>
      <p id="scannerText">เล็งกล้องไปที่ Barcode / QR Code</p>
      <button class="scanner-close" onclick="closeScanner()">ปิดกล้อง</button>
    </div>
  </div>

  <div id="loading" class="loading"><span id="loadingText"></span></div>
  <div id="toast" class="toast"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js?v=zxing-fast-camera-v1').catch(() => {});
      });
    }
  </script>
</body>
</html>
